<main class="login-page">
  <div class="login-card-split">
    <!-- Left Side: Form -->
    <div class="login-form-side">

      <div class="form-header">
        <h1>JEEVAN SETU</h1>
        <p>Hey, welcome back to your special place</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form" novalidate>
        <div class="input-wrap">
          <input id="email" type="email" placeholder="stanley@gmail.com" formControlName="email" />
        </div>

        <div class="input-wrap password-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="••••••••••••"
            formControlName="password"
          />
          <button
            class="toggle-password"
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-pressed]="showPassword"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>

        <div class="form-actions-row">
          <label class="remember-me">
            <input type="checkbox" />
            <span class="checkmark"></span>
            Remember me
          </label>
          <!-- <a href="#" class="forgot-pwd">Forgot Password?</a> -->
        </div>

        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button class="login-btn" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing In...' : 'Sign In' }}
        </button>
      </form>
    </div>

    <!-- Right Side: Illustration -->
    <div class="login-image-side">
      <img
        class="login-illustration"
        src="/illustration-of-medical.jpg"
        alt="Medical illustration"
      />
    </div>
  </div>
</main>
