<main class="login-page">
  <div class="login-card-split">
    <!-- Left Side: Form -->
    <div class="login-form-side">

      <div class="form-header">
        <h1>JEEVAN SETU</h1>
        <p>Hey, welcome back to your special place</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form" novalidate>
        <div class="input-wrap">
          <input id="email" type="email" placeholder="stanley@gmail.com" formControlName="email" />
        </div>

        <div class="input-wrap">
          <input id="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••••••"
            formControlName="password" />
        </div>

        <div class="form-actions-row">
          <label class="remember-me">
            <input type="checkbox" />
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-pwd">Forgot Password?</a>
        </div>

        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button class="login-btn" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing In...' : 'Sign In' }}
        </button>
      </form>
    </div>

    <!-- Right Side: Lottie -->
    <div class="login-image-side">
      <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
        <ng-lottie [options]="lottieOptions" width="450px" height="450px"></ng-lottie>
      </div>
    </div>
  </div>
</main>
