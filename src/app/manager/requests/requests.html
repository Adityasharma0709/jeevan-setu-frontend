    <div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">My Sent Requests</h2>
        <p class="text-gray-600">Track requests created by you, along with status and target approver.</p>
    </div>

    <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
        <table z-table class="w-full">
            <thead z-table-header>
                <tr z-table-row>
                    <th z-table-head>Request Type</th>
                    <th z-table-head>Sent To</th>
                    <th z-table-head>Status</th>
                    <th z-table-head>Requested At</th>
                    <th z-table-head>Remarks</th>
                </tr>
            </thead>
            <tbody z-table-body>
                <tr z-table-row *ngFor="let request of myRequests">
                    <td z-table-cell>
                        <span class="px-2 py-1 rounded-full text-xs font-semibold"
                            [ngClass]="getTypeBadgeClass(request.type)">
                            {{ request.type }}
                        </span>
                    </td>
                    <td z-table-cell class="font-medium">{{ request.sentTo }}</td>
                    <td z-table-cell>
                        <span class="px-2 py-1 rounded-full text-xs font-semibold"
                            [ngClass]="getStatusBadgeClass(request.status)">
                            {{ request.status }}
                        </span>
                    </td>
                    <td z-table-cell class="text-sm text-gray-500">{{ request.createdAt | date:'short' }}</td>
                    <td z-table-cell class="text-sm text-gray-600">{{ request.remarks || '-' }}</td>
                </tr>
                <tr z-table-row *ngIf="myRequests.length === 0">
                    <td z-table-cell colspan="5" class="text-center py-12 text-gray-500">
                        <div class="flex flex-col items-center">
                            <z-icon zType="circle-check" size="32" class="text-green-300 mb-2" />
                            <p>No requests created by you yet.</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
