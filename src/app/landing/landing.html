<main class="landing-page">

  <div class="landing-container animate-fade-in">
    <!-- Visual Pane: Left Side (Desktop) / Background Overlay (Mobile) -->
    <div class="visual-grid-pane">
      <!-- Decorative tilted card mosaic (3 columns) -->
      <div class="tilted-cards-grid" aria-hidden="true">
        <div
          class="tilted-cards-cell"
          *ngFor="let card of backgroundCards; index as i; trackBy: trackByIndex"
        >
          <app-landing-card [bgImage]="card.bgImage" [showGlow]="true">
            <ng-container [ngSwitch]="card.kind">
              <div *ngSwitchCase="'image'" class="doctor-overlay"></div>
              <div *ngSwitchDefault class="mosaic-blank"></div>
            </ng-container>
          </app-landing-card>
        </div>
      </div>
    </div>

    <!-- Content Pane: Right Side (Desktop) / Foreground (Mobile) -->
    <div class="content-pane">
      <div class="content-inner">
        <!-- Brand Logo Block -->
        <section class="brand-logo-section animate-fade-in">
          <div class="logo-wrapper">
            <img src="Landing.png" alt="Jeevan Setu Logo" class="logo-image" />
          </div>
        </section>

        <!-- Headings / Text -->
        <header class="branding-header">
          <h1 class="welcome-title">Welcome to Jeevan Setu</h1>
          <p class="welcome-subtitle">A Bridge to Better Health &amp; Wellbeing</p>
        </header>

        <!-- Dynamic Action Stack -->
        <footer class="action-footer">
          <button 
            class="action-btn btn-login" 
            type="button" 
            (click)="navigateToLogin()" 
            aria-label="Navigate to Login"
          >
            Login
          </button>

          <p class="platform-text">Community Healthcare Platform</p>
        </footer>
      </div>
    </div>
  </div>
</main>
