<div class="space-y-6 max-w-7xl mx-auto p-5 md:p-6 pb-28 md:pb-20">
  <div
    class="sticky top-0 z-40 -mx-5 -mt-5 space-y-5 rounded-b-3xl border-x border-b border-white/70 bg-white/70 px-5 py-4 shadow-[0_10px_32px_rgba(15,23,42,0.08)] backdrop-blur-2xl ring-1 ring-slate-200/40 md:hidden"
  >
    <div class="pt-0.5">
      <h2 class="text-[18px] font-bold leading-tight text-slate-900">My Profile</h2>
      <p class="text-[14px] text-slate-500">Update your profile details below.</p>
    </div>
  </div>

  <ng-container *ngIf="state$ | async as state; else profileLoader">
    <section class="bg-white border rounded-xl p-6">
      <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <z-form-field>
          <label z-form-label zRequired>Name</label>
          <z-form-control><input z-input formControlName="name" /></z-form-control>
        </z-form-field>

        <z-form-field>
          <label z-form-label zRequired>Email</label>
          <z-form-control><input z-input formControlName="email" /></z-form-control>
        </z-form-field>

        <z-form-field>
          <label z-form-label>Mobile</label>
          <z-form-control><input z-input formControlName="mobile" maxlength="10" /></z-form-control>
        </z-form-field>

        <z-form-field>
          <label z-form-label>New Password (optional)</label>
          <z-form-control>
            <input
              z-input
              type="password"
              formControlName="password"
              placeholder="Enter new password"
              autocomplete="new-password"
            />
          </z-form-control>
          <p class="mt-1 text-xs text-gray-500">Leave blank if you don't want to change it.</p>
        </z-form-field>

        <div class="md:col-span-2 flex justify-end pt-2 border-t">
          <button z-button type="button" variant="ghost" (click)="cancel()">Cancel</button>
          <button
            z-button
            type="button"
            [disabled]="isSubmitting"
            (click)="submit()"
            class="bg-indigo-600 hover:bg-indigo-700 text-white min-w-[140px]"
          >
            {{ isSubmitting ? 'Updating...' : 'Update Profile' }}
          </button>
        </div>
      </form>
    </section>
  </ng-container>

  <ng-template #profileLoader>
    <div class="flex flex-col items-center justify-center w-full min-h-[60vh] gap-4">
      <ng-lottie [options]="options" height="160px" width="160px"></ng-lottie>
      <p class="text-gray-500 font-medium animate-pulse">Loading Profile...</p>
    </div>
  </ng-template>
</div>
