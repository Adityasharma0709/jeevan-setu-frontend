<div class="max-w-3xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">My Profile</h1>
    <p class="text-gray-600">Submit profile updates via outreach request workflow.</p>
  </div>

  <ng-container *ngIf="state$ | async as state">
    <div *ngIf="state.status === 'loading'" class="flex items-center justify-center py-6">
      <ng-lottie [options]="options" height="140px" width="140px"></ng-lottie>
    </div>

    <section class="bg-white border rounded-xl p-6" *ngIf="state.status !== 'loading'">
      <form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <z-form-field>
        <label z-form-label zRequired>Name</label>
        <z-form-control><input z-input formControlName="name" /></z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label zRequired>Email</label>
        <z-form-control><input z-input formControlName="email" /></z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label>Mobile</label>
        <z-form-control><input z-input formControlName="mobile" maxlength="10" /></z-form-control>
      </z-form-field>

      <z-form-field class="md:col-span-2">
        <label z-form-label zRequired>Reason for change</label>
        <z-form-control>
          <textarea z-input formControlName="reason" rows="3" placeholder="Explain why this change is needed"></textarea>
        </z-form-control>
      </z-form-field>

      <div class="md:col-span-2 flex justify-end pt-2 border-t">
        <button z-button type="button" [disabled]="isSubmitting" (click)="submit()">
          <z-icon zType="check" class="mr-2" />
          {{ isSubmitting ? 'Submitting...' : 'Submit Request' }}
        </button>
      </div>
      </form>
    </section>
  </ng-container>
</div>
