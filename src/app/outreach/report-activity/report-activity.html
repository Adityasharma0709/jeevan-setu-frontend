<div class="space-y-6 max-w-7xl mx-auto p-5 md:p-6 pb-28 md:pb-20">
  <!-- Header -->

  <!-- <button z-button variant="outline" (click)="cancel()">
      <z-icon zType="x" class="mr-2" />
      Cancel
    </button> -->

  <section class="bg-white border rounded-xl p-6 shadow-sm">
    <form [formGroup]="reportForm" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Activity -->
        <z-form-field>
          <label z-form-label zRequired>Activity</label>
          <z-form-control>
            <z-combobox
              formControlName="activityId"
              [options]="(activities$ | async) || []"
              placeholder="Select activity"
              zWidth="full"
            />
          </z-form-control>
        </z-form-field>

        <!-- Session -->
        <z-form-field>
          <label z-form-label zRequired>Session</label>
          <z-form-control>
            <z-combobox
              formControlName="sessionId"
              [options]="(sessions$ | async) || []"
              [zDisabled]="!reportForm.get('activityId')?.value"
              placeholder="Select session"
              zWidth="full"
            />
          </z-form-control>
        </z-form-field>

        <!-- Reporting Date -->
        <z-form-field>
          <label z-form-label zRequired>Reporting Date</label>
          <z-form-control class="relative">
            <input
              z-input
              type="text"
              formControlName="sessionDate"
              placeholder="DD-MM-YYYY"
              maxlength="10"
              class="pr-10"
            />
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
              <z-icon zType="calendar" class="w-4 h-4 text-gray-400 pointer-events-none" />
              <input
                type="date"
                class="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                (change)="onPickerChange($event)"
              />
            </div>
          </z-form-control>
        </z-form-field>

        <!-- Beneficiary (Searchable) -->
        <z-form-field class="relative">
          <label z-form-label zRequired>Beneficiary</label>
          <z-form-control>
            <input
              z-input
              type="text"
              placeholder="Search by name, UID or mobile..."
              (input)="onSearchBeneficiary($event)"
              [value]="beneficiarySearch$.value"
            />
            <div
              *ngIf="beneficiarySearch$.value && !reportForm.get('beneficiaryId')?.value"
              class="absolute z-10 w-full mt-1 bg-white border rounded-lg shadow-lg max-h-48 overflow-y-auto"
            >
              <div
                *ngFor="let ben of beneficiaries$ | async"
                (click)="onSelectBeneficiary(ben)"
                class="p-2 hover:bg-gray-50 cursor-pointer border-b last:border-0 text-sm"
              >
                <div class="flex items-center justify-between">
                  <div class="font-medium">{{ ben.name }}</div>
                  <div
                    *ngIf="ben.isChild"
                    class="text-[10px] bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded-full font-bold uppercase"
                  >
                    Family
                  </div>
                </div>
                <div class="text-[10px] text-gray-500">
                  <ng-container *ngIf="!ben.isChild"
                    >{{ ben.uid }} · {{ ben.mobileNumber }}</ng-container
                  >
                  <ng-container *ngIf="ben.isChild"
                    >Child of {{ ben.parentName }} · {{ ben.uid }}</ng-container
                  >
                </div>
              </div>
            </div>
          </z-form-control>
        </z-form-field>

        <!-- Family Member Selection (Conditional) -->
        <z-form-field
          *ngIf="selectedBeneficiary()?.children?.length"
        >
          <label z-form-label>Target Person (Family Member)</label>
          <z-form-control>
            <z-combobox
              formControlName="childId"
              [options]="familyMemberOptions"
              [searchable]="false"
              placeholder="Select person"
              zWidth="full"
            />
          </z-form-control>
        </z-form-field>

        <!-- Age -->
        <z-form-field>
          <label z-form-label>Age</label>
          <z-form-control>
            <input z-input type="text" formControlName="age" placeholder="Auto-calculated" readonly class="bg-gray-50" />
          </z-form-control>
        </z-form-field>

        <!-- Group -->
        <z-form-field>
          <label z-form-label>Group</label>
          <z-form-control>
            <input z-input type="text" formControlName="groupText" placeholder="Auto-determined" readonly class="bg-gray-50" />
          </z-form-control>
        </z-form-field>      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t">
        <!-- Screening -->
        <z-form-field>
          <label z-form-label zRequired>Screening/Services</label>
          <z-form-control>
            <z-combobox
              formControlName="screening"
              [options]="screeningOptions"
              [searchable]="false"
              zWidth="full"
            />
          </z-form-control>
        </z-form-field>

        <!-- Pregnancy Status (Female 14+) -->
        <z-form-field *ngIf="showPregnancy">
          <label z-form-label>
            Pregnancy Status
            <span
              class="ml-1 text-xs font-normal text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded-full"
              >Female 14+</span
            >
          </label>
          <z-form-control>
            <z-combobox
              formControlName="pregnancyStatus"
              [options]="pregnancyStatusOptions"
              [searchable]="false"
              placeholder="Select status"
              zWidth="full"
            />
          </z-form-control>
        </z-form-field>

        <!-- Pregnancy Outcome (Female 14+ and previously pregnant) -->
        <z-form-field *ngIf="showOutcomeDropdown">
          <label z-form-label>
            Pregnancy Outcome
            <span
              class="ml-1 text-xs font-normal text-indigo-500 bg-indigo-50 px-1.5 py-0.5 rounded-full"
              >Female 14+</span
            >
          </label>
          <z-form-control>
            <z-combobox
              formControlName="pregnancyOutcome"
              [options]="pregnancyOutcomeOptions"
              [searchable]="false"
              placeholder="Select outcome"
              zWidth="full"
            />
          </z-form-control>
        </z-form-field>

        <!-- LMP Date (when Pregnancy = Currently Pregnant) -->
        <z-form-field *ngIf="showPregnancy && showLmpDate">
          <label z-form-label>
            LMP Date
            <span class="ml-1 text-xs font-normal text-gray-400">(DD/MM/YYYY)</span>
          </label>
          <z-form-control class="relative">
            <input
              z-input
              type="text"
              formControlName="lmpDate"
              placeholder="DD/MM/YYYY"
              maxlength="10"
              class="pr-10"
            />
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
              <z-icon zType="calendar" class="w-4 h-4 text-gray-400 pointer-events-none" />
              <input
                type="date"
                class="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                (change)="onLmpPickerChange($event)"
              />
            </div>
          </z-form-control>
        </z-form-field>

        <!-- EDD (when Pregnancy = Currently Pregnant) -->
        <z-form-field *ngIf="showPregnancy && showLmpDate">
          <label z-form-label>
            EDD (Expected Delivery Date)
            <span class="ml-1 text-xs font-normal text-gray-400">(DD/MM/YYYY)</span>
          </label>
          <z-form-control class="relative">
            <input
              z-input
              type="text"
              formControlName="edd"
              placeholder="DD/MM/YYYY"
              maxlength="10"
              class="pr-10"
            />
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
              <z-icon zType="calendar" class="w-4 h-4 text-gray-400 pointer-events-none" />
              <input
                type="date"
                class="absolute inset-0 opacity-0 cursor-pointer w-full h-full"
                (change)="onEddPickerChange($event)"
              />
            </div>
          </z-form-control>
        </z-form-field>

        <!-- Date (when Pregnancy = Still Birth or Miscarriage outcome) -->
        <z-form-field *ngIf="showPregnancy && showPregnancyDate">
          <label z-form-label>
            {{ reportForm.get('pregnancyOutcome')?.value === 'Still Birth' ? 'Date of Still Birth' : 'Date of Miscarriage/Abortion' }}
            <span class="ml-1 text-xs font-normal text-gray-400">(DD/MM/YYYY)</span>
          </label>
          <z-form-control class="relative">
            <input z-input type="text" formControlName="pregnancyDate" placeholder="DD/MM/YYYY" maxlength="10" class="pr-10" />
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
              <z-icon zType="calendar" class="w-4 h-4 text-gray-400 pointer-events-none" />
              <input type="date" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full" (change)="onPregnancyDatePickerChange($event)" />
            </div>
          </z-form-control>
        </z-form-field>

        <!-- DOD (when Pregnancy = Baby Delivered outcome) -->
        <z-form-field *ngIf="showPregnancy && showDeliveryDate">
          <label z-form-label>
            Date of Delivery
            <span class="ml-1 text-xs font-normal text-gray-400">(DD/MM/YYYY)</span>
          </label>
          <z-form-control class="relative">
            <input z-input type="text" formControlName="deliveryDate" placeholder="DD/MM/YYYY" maxlength="10" class="pr-10" />
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center">
              <z-icon zType="calendar" class="w-4 h-4 text-gray-400 pointer-events-none" />
              <input type="date" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full" (change)="onDeliveryDatePickerChange($event)" />
            </div>
          </z-form-control>
        </z-form-field>

        <!-- SAM/MAM Status (Child ≤ 5 years) -->
        <z-form-field *ngIf="showSamMam">
          <label z-form-label>
            Nutritional Status
            <span
              class="ml-1 text-xs font-normal text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded-full"
              >Child ≤ 5 yrs</span
            >
          </label>
          <z-form-control>
            <z-combobox
              formControlName="samMamStatus"
              [options]="samMamOptions"
              [searchable]="false"
              placeholder="Select SAM/MAM status"
              zWidth="full"
            />
          </z-form-control>
        </z-form-field>
      </div>

      <!-- Baby Details (Baby Delivered) -->
      <div *ngIf="showPregnancy && showDeliveryDate" formGroupName="babyDetails" class="mt-4 p-4 border rounded-xl bg-gray-50/50 space-y-4 animate-in fade-in slide-in-from-top-2">
        <h3 class="text-sm font-semibold text-gray-800">Add Baby as Family Member</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <z-form-field>
            <label z-form-label>Name</label>
            <z-form-control>
              <input z-input type="text" formControlName="name" placeholder="Baby Name" />
            </z-form-control>
          </z-form-field>

          <z-form-field>
            <label z-form-label>Gender</label>
            <z-form-control>
              <z-combobox formControlName="gender" [options]="genderOptions" [searchable]="false" placeholder="Select gender" zWidth="full" />
            </z-form-control>
          </z-form-field>

          <z-form-field>
            <label z-form-label>Relation</label>
            <z-form-control>
              <input z-input type="text" formControlName="relation" placeholder="Son/Daughter" readonly class="bg-gray-100" />
            </z-form-control>
          </z-form-field>
        </div>
      </div>

      <!-- Tests Selection (Conditional) -->
      <div
        *ngIf="reportForm.get('screening')?.value === 'Yes'"
        class="space-y-4 animate-in fade-in slide-in-from-top-2"
      >
        <div>
          <label class="text-sm font-medium text-gray-700 mb-2 block"
            >Select Tests/Services Conducted</label
          >
          <div class="flex flex-wrap gap-2">
            <button
              *ngFor="let test of availableTests"
              type="button"
              (click)="toggleTest(test.id)"
              [class]="
                isTestSelected(test.id)
                  ? 'bg-indigo-600 text-white border-indigo-600'
                  : 'bg-white text-gray-700 border-gray-200'
              "
              class="px-3 py-1.5 rounded-full text-xs font-medium border transition-colors hover:border-indigo-400"
            >
              {{ test.label }}
            </button>
          </div>
        </div>

        <!-- Test Results Grid -->
        <div
          class="grid grid-cols-1 md:grid-cols-3 gap-4"
          [formGroup]="$any(reportForm.get('testValues'))"
        >
          <!-- Height -->
          <z-form-field *ngIf="isTestSelected('height')">
            <label z-form-label>Height (cm)</label>
            <z-form-control>
              <input z-input type="number" formControlName="height" placeholder="0" />
            </z-form-control>
          </z-form-field>

          <!-- Weight -->
          <z-form-field *ngIf="isTestSelected('weight')">
            <label z-form-label>Weight (kg)</label>
            <z-form-control>
              <input z-input type="number" formControlName="weight" placeholder="0" />
            </z-form-control>
          </z-form-field>

          <!-- Hb -->
          <z-form-field *ngIf="isTestSelected('hb')">
            <label z-form-label>Hb (g/dL)</label>
            <z-form-control>
              <input z-input type="number" formControlName="hb" placeholder="0" />
            </z-form-control>
          </z-form-field>

          <!-- BP -->
          <z-form-field *ngIf="isTestSelected('bp')" class="md:col-span-1">
            <label z-form-label>BP (Systolic/Diastolic)</label>
            <div class="flex items-center gap-2">
              <z-form-control class="flex-1">
                <input z-input type="number" formControlName="bpSystolic" placeholder="Sys" />
              </z-form-control>
              <span class="text-gray-400">/</span>
              <z-form-control class="flex-1">
                <input z-input type="number" formControlName="bpDiastolic" placeholder="Dia" />
              </z-form-control>
            </div>
          </z-form-field>

          <!-- Sugar -->
          <z-form-field *ngIf="isTestSelected('sugar')">
            <label z-form-label>Sugar (mg/dL)</label>
            <z-form-control>
              <input z-input type="number" formControlName="sugar" placeholder="0" />
            </z-form-control>
          </z-form-field>

          <!-- Cervical Cancer -->
          <z-form-field *ngIf="isTestSelected('cervicalCancer')">
            <label z-form-label>Cervical Cancer</label>
            <z-form-control>
              <z-combobox
                formControlName="cervicalCancer"
                [options]="cancerResultOptions"
                [searchable]="false"
                zWidth="full"
              />
            </z-form-control>
          </z-form-field>

          <!-- Breast Cancer -->
          <z-form-field *ngIf="isTestSelected('breastCancer')">
            <label z-form-label>Breast Cancer</label>
            <z-form-control>
              <z-combobox
                formControlName="breastCancer"
                [options]="cancerResultOptions"
                [searchable]="false"
                zWidth="full"
              />
            </z-form-control>
          </z-form-field>

          <!-- Pads -->
          <z-form-field *ngIf="isTestSelected('pads')">
            <label z-form-label>Number of Pads</label>
            <z-form-control>
              <input z-input type="number" formControlName="pads" placeholder="0" />
            </z-form-control>
          </z-form-field>
        </div>
      </div>

      <div class="flex items-center justify-between gap-2 pt-6 border-t mt-4">
        <div class="flex items-center gap-3">
          <button z-button type="button" zType="outline" (click)="cancel()">Cancel</button>
          <button
            z-button
            type="button"
            [disabled]="isSubmitting"
            (click)="submit()"
          >
            {{
              isSubmitting
                ? isEditing
                  ? 'Updating...'
                  : 'Submitting...'
                : isEditing
                  ? 'Update Report'
                  : 'Submit Report'
            }}
          </button>
        </div>
      </div>
    </form>
  </section>
</div>
