        <ng-template #sectionLoader>
            <div class="flex items-center justify-center py-10 w-full min-h-[160px]">
                <div class="bg-gray-100 rounded-full p-4 ring-1 ring-gray-200">
                    <ng-lottie [options]="subLoaderOptions" height="96px" width="96px"></ng-lottie>
                </div>
            </div>
        </ng-template>

        <!-- Recent Cards -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <!-- Recent Beneficiaries -->
        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold">Recent Beneficiaries</h3>
                <!-- <div class="flex items-center gap-3">
                    <a routerLink="/outreach/beneficiaries" class="text-xs text-indigo-600 hover:underline font-medium">View all</a>
                </div> -->
            </div>

            <ng-container *ngIf="recentBeneficiariesVm$ | async as vm; else sectionLoader">

                <!-- Standardized Pagination (Admin Style) -->

                <ng-template #noBen>
                    <div class="text-center py-10">
                        <z-icon zType="users" class="w-12 h-12 text-gray-200 mx-auto mb-3" />
                        <p class="text-gray-400 italic text-sm font-medium">No beneficiaries found.</p>
                    </div>
                </ng-template>
            </ng-container>
        </div>

        <!-- My Requests -->
        <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold truncate pr-2">My Requests</h3>
            </div>

            <ng-container *ngIf="recentRequestsVm$ | async as vm; else sectionLoader">
                           <!-- Standardized Pagination (Admin Style) -->
                <ng-template #noReq>
                    <div class="text-center py-10">
                        <z-icon zType="file-text" class="w-12 h-12 text-gray-200 mx-auto mb-3" />
                        <p class="text-gray-400 italic text-sm font-medium">No requests sent yet.</p>
                    </div>
                </ng-template>
            </ng-container>
        </div>
    </div>

    <!-- Assigned Projects & Locations -->
    <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm mb-8">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold">Assigned Projects &amp; Locations</h3>
    
        </div>

        <ng-container *ngIf="assignedProjectsVm$ | async as pager; else sectionLoader">
                <!-- Pagination -->

            <ng-template #noAssignedProjects>
                <div class="text-center py-6 text-gray-400 italic">No projects assigned to you yet.</div>

</div>
</ng-container>

<ng-template #loader>
    <div class="flex flex-col items-center justify-center w-full min-h-[50vh] gap-4">
        <ng-lottie [options]="options" height="160px" width="160px"></ng-lottie>
        <p class="text-gray-500 font-medium animate-pulse">Loading dashboard data...</p>
    </div>
</ng-template>
