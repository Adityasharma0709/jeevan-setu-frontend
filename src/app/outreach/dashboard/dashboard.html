<ng-container *ngIf="facade.stats$ | async as stats; else loader" class="fade-in">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-xl flex items-center gap-3 shadow-sm mb-4">
            <z-icon zType="circle-alert" class="w-5 h-5 text-amber-600"></z-icon>
            <p class="text-sm font-semibold m-0">Development is under process for the dashboard section.</p>
        </div>

        <app-dashboard-actions-widget></app-dashboard-actions-widget>
        <app-outreach-summary-widget></app-outreach-summary-widget>
        <app-coverage-widget></app-coverage-widget>
        <app-activity-sessions-widget></app-activity-sessions-widget>

        <ng-template #sectionLoader>
            <div class="flex items-center justify-center py-10 w-full min-h-[160px]">
                <div class="bg-gray-100 rounded-full p-4 ring-1 ring-gray-200">
                    <ng-lottie [options]="subLoaderOptions" height="96px" width="96px"></ng-lottie>
                </div>
            </div>
        </ng-template>
    </div>
</ng-container>

<ng-template #loader>
    <div class="flex flex-col items-center justify-center w-full min-h-[50vh] gap-4">
        <ng-lottie [options]="options" height="160px" width="160px"></ng-lottie>
        <p class="text-gray-500 font-medium animate-pulse">Loading dashboard data...</p>
    </div>
</ng-template>
