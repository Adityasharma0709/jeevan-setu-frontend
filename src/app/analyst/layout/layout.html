<div class="flex flex-col h-dvh overflow-y-hidden w-full bg-[#f0f7ff]">
  <!-- ================= TOPBAR ================= -->
  <header
    class="flex items-center justify-between px-4 py-2.5 bg-white border-b border-sky-100 shrink-0 select-none shadow-sm">
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 rounded-full bg-sky-600 text-white flex items-center justify-center font-bold text-lg shadow-sm">
        <z-icon zType="popcorn"></z-icon>
      </div>
      <div class="flex flex-col leading-tight">
        <span class="text-xl font-bold text-sky-900 tracking-wide">
          {{ (profile$ | async)?.name || 'Analyst' }}
        </span>
        <span class="text-xs font-medium text-sky-700">
          Analyst · ACC CODE:
          {{ (profile$ | async)?.usercode || (profile$ | async)?.id || '-' }}
        </span>
      </div>
      <button type="button" z-button zType="ghost" (click)="toggleSidebar()"
        class="ml-4 text-gray-500 hover:text-sky-800">
        <z-icon zType="panel-left"></z-icon>
      </button>
    </div>
  </header>

  <!-- ================= LAYOUT ================= -->
  <z-layout class="flex-1 overflow-hidden flex border-none bg-transparent">

    <!-- ================= SIDEBAR ================= -->
    <z-sidebar [zWidth]="250" [zCollapsible]="true" [zCollapsed]="sidebarCollapsed"
      [zCollapsedWidth]="isMobile ? 0 : 72" (zCollapsedChange)="sidebarCollapsed = $event"
      class="p-0! bg-white border-r border-sky-100 shadow-sm z-50 transition-all duration-300"
      [class]="!sidebarCollapsed && isMobile ? 'fixed inset-y-0 left-0 shadow-2xl z-50' : ''">

      <nav class="flex h-full flex-col overflow-hidden bg-white"
        [ngClass]="sidebarCollapsed ? 'gap-1 p-2 pt-4' : 'gap-2 p-3'">

        <!-- ===== MENU GROUP ===== -->
        <z-sidebar-group>

          <!-- Dashboard -->
          <a routerLink="/analyst" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"
            class="menu-link" [class.justify-center]="sidebarCollapsed" [zTooltip]="sidebarCollapsed ? 'Dashboard' : ''"
            zPosition="right" (click)="closeSidebar()">
            <z-icon zType="layout-dashboard" [class]="sidebarCollapsed ? '' : 'mr-3 text-sky-500'" />
            @if (!sidebarCollapsed) { <span class="flex-1">Dashboard</span> }
          </a>

          <!-- Beneficiary -->
          <a routerLink="/analyst/beneficiary" routerLinkActive="active-link"
            class="menu-link" [class.justify-center]="sidebarCollapsed" [zTooltip]="sidebarCollapsed ? 'Beneficiary' : ''"
            zPosition="right" (click)="closeSidebar()">
            <z-icon zType="users" [class]="sidebarCollapsed ? '' : 'mr-3 text-emerald-500'" />
            @if (!sidebarCollapsed) { <span class="flex-1">Beneficiary</span> }
          </a>

        </z-sidebar-group>

        <!-- ===== BOTTOM ACTIONS ===== -->
        <div class="mt-auto pt-2 border-t border-sky-50 flex flex-col gap-1">

          <a routerLink="/analyst/profile" routerLinkActive="active-link" class="menu-link"
            [class.justify-center]="sidebarCollapsed" [zTooltip]="sidebarCollapsed ? 'Profile' : ''" zPosition="right"
            (click)="closeSidebar()">
            <z-icon zType="user" [class]="sidebarCollapsed ? '' : 'mr-3 text-orange-500'" />
            @if (!sidebarCollapsed) { <span class="flex-1">Profile</span> }
          </a>

          <button type="button" class="menu-link w-full text-red-600 hover:bg-red-50"
            [class.justify-center]="sidebarCollapsed" [zTooltip]="sidebarCollapsed ? 'Logout' : ''" zPosition="right"
            (click)="logout()">
            <z-icon zType="log-out" [class]="sidebarCollapsed ? '' : 'mr-3'" />
            @if (!sidebarCollapsed) { <span class="flex-1 text-left">Logout</span> }
          </button>

        </div>

      </nav>
    </z-sidebar>

    <!-- Mobile Backdrop -->
    <div *ngIf="isMobile && !sidebarCollapsed" (click)="sidebarCollapsed = true"
      class="fixed inset-0 bg-black/40 z-40 animate-in fade-in duration-300">
    </div>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="flex flex-col flex-1 min-w-0 min-h-0 overflow-hidden bg-[#f0f7ff]">
      <z-content class="flex-1 min-h-0 overflow-y-auto p-4 md:p-6 lg:p-8 bg-transparent">
        <router-outlet></router-outlet>
      </z-content>
    </div>

  </z-layout>
</div>
