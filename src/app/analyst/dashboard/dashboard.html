<ng-container *ngIf="facade.stats$ | async as stats; else loader" class="fade-in">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <app-outreach-summary-widget></app-outreach-summary-widget>
        <app-coverage-widget></app-coverage-widget>
        <app-activity-sessions-widget></app-activity-sessions-widget>
    </div>
</ng-container>

<ng-template #loader>
    <div class="flex flex-col items-center justify-center w-full min-h-[50vh] gap-4">
        <ng-lottie [options]="options" height="160px" width="160px"></ng-lottie>
        <p class="text-gray-500 font-medium animate-pulse">Loading dashboard data...</p>
    </div>
</ng-template>
