<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
    <h2 class="text-xl font-bold">Activities Management</h2>
    <button z-button (click)="openCreateDialog()">
        <z-icon zType="plus" class="mr-2" />
        Create Activity
    </button>
</div>

<div class="bg-white border rounded-lg overflow-hidden">
    <table z-table class="w-full">
        <thead z-table-header>
            <tr z-table-row>
                <th z-table-head>Name</th>
                <th z-table-head>Description</th>
                <th z-table-head>Status</th>
                <th z-table-head class="text-right">Actions</th>
            </tr>
        </thead>
        <tbody z-table-body>
            <tr z-table-row *ngFor="let activity of activities$ | async">
                <td z-table-cell class="font-medium">{{ activity.name }}</td>
                <td z-table-cell class="text-gray-600">{{ activity.description }}</td>
                <td z-table-cell>
                    <span class="px-2 py-1 rounded text-xs font-medium bg-green-100 text-green-700">
                        {{ activity.status }}
                    </span>
                </td>
                <td z-table-cell class="text-right">
                    <div class="flex justify-end gap-2">
                        <button z-button zType="secondary" zSize="sm" (click)="openEditDialog(activity)">
                            Edit
                        </button>
                        <button z-button zType="destructive" zSize="sm" (click)="deactivateActivity(activity.id)">
                            Deactivate
                        </button>
                    </div>
                </td>
            </tr>
            <tr z-table-row *ngIf="(activities$ | async)?.length === 0">
                <td z-table-cell colspan="4" class="text-center py-8 text-gray-500">
                    No active activities found.
                </td>
            </tr>
        </tbody>
    </table>
</div>

<ng-template #activityDialog>
    <form [formGroup]="activityForm" class="space-y-4 py-2">
        <z-form-field>
            <label z-form-label zRequired>Activity Name</label>
            <z-form-control>
                <input z-input type="text" formControlName="name" placeholder="Enter activity name" />
            </z-form-control>
        </z-form-field>

        <z-form-field>
            <label z-form-label>Description</label>
            <z-form-control>
                <textarea z-input formControlName="description" placeholder="Enter description" rows="3"></textarea>
            </z-form-control>
        </z-form-field>
    </form>
</ng-template>
